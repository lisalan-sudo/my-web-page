<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词拼写挑战</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { color: #333; font-size: 1.5rem; margin-bottom: 2rem; }

        #word-display {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        #meaning-display {
            color: #666;
            margin-bottom: 2rem;
            font-style: italic;
        }

        input {
            width: 80%;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--primary-color); }

        .correct { border-color: var(--success-color) !important; background-color: #ebfaef; }
        .wrong { border-color: var(--error-color) !important; background-color: #fdf2f2; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .score-board { margin-top: 2rem; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>单词拼写闯关</h1>
    <div id="word-display">Loading...</div>
    <div id="meaning-display">加载中...</div>
    
    <input type="text" id="user-input" placeholder="在这里输入单词..." autocomplete="off">

    <div class="score-board">
        已完成: <span id="score">0</span>
    </div>
</div>

<audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<script>
    // 在这里添加你的单词库
    const wordList = [
        { word: 'apple', meaning: '苹果' },
        { word: 'banana', meaning: '香蕉' },
        { word: 'computer', meaning: '计算机' },
        { word: 'english', meaning: '英语' },
        { word: 'journey', meaning: '旅程' },
        { word: 'success', meaning: '成功' },
        { word: 'matcha', meaning: '抹茶' }
    ];

    let currentWordObj = {};
    let score = 0;

    const wordDisplay = document.getElementById('word-display');
    const meaningDisplay = document.getElementById('meaning-display');
    const userInput = document.getElementById('user-input');
    const scoreDisplay = document.getElementById('score');
    const successSound = document.getElementById('success-sound');

    function nextWord() {
        userInput.value = '';
        userInput.classList.remove('correct', 'wrong');
        const randomIndex = Math.floor(Math.random() * wordList.length);
        currentWordObj = wordList[randomIndex];
        wordDisplay.textContent = currentWordObj.word;
        meaningDisplay.textContent = currentWordObj.meaning;
    }

    userInput.addEventListener('input', () => {
        const value = userInput.value.toLowerCase().trim();
        const target = currentWordObj.word.toLowerCase();

        if (value === target) {
            // 输入正确
            userInput.classList.add('correct');
            userInput.classList.remove('wrong');
            successSound.play();
            score++;
            scoreDisplay.textContent = score;
            
            // 1秒后自动切换下一个单词
            setTimeout(nextWord, 1000);
        } else if (value.length > 0 && !target.startsWith(value)) {
            // 输入错误
            userInput.classList.add('wrong');
        } else {
            // 正在输入或删除了错误部分
            userInput.classList.remove('wrong', 'correct');
        }
    });

    // 初始化第一个单词
    nextWord();
</script>

</body>
</html>
